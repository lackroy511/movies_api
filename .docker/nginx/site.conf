server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /data/html;
    index index.html;

    location /admin/ {
        proxy_pass http://movies_django:8000/admin/;
    }

    location /api/ {
        proxy_pass http://movies_api:8010/api/;
    }

    location /static/ {
        alias /data/staticfiles/;
    }

    location / {
        try_files $uri $uri/ /404.html;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {}
    location = /50x.html {}
}