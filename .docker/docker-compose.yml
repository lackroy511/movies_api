services:
  nginx:
    image: nginx:1.29.5
    container_name: movies_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/site.conf:/etc/nginx/conf.d/site.conf:ro
      - static_volume:/data/staticfiles:ro
      - ../admin_panel/html:/data/html:ro
    depends_on:
      - movies_django
    ports:
      - 80:80
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  movies_django:
    container_name: movies_django
    build:
      context: ../admin_panel/
    command: >
      sh -c "python manage.py migrate &&
             python manage.py createsuperuser --no-input || true &&
             gunicorn --chdir /app config.wsgi:application --workers 2 --timeout 300 --bind 0.0.0.0:8000 --no-control-socket"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ../.env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    depends_on:
      movies_database:
        condition: service_healthy
      movies_elastic:
        condition: service_healthy

  movies_etl:
    container_name: movies_etl
    build:
      context: ../etl/
    command: >
      sh -c "sleep 5 && python src_etl/main.py"
    volumes:
      - etl_logs:/app/logs
    env_file:
      - ../.env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    depends_on:
      movies_database:
        condition: service_healthy
      movies_elastic:
        condition: service_healthy
      movies_django:
        condition: service_started
  
  movies_api:
    container_name: movies_api
    build:
      context: ../api/
    command: >
      sh -c "gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:8010 src_api.main:app --no-control-socket"
    env_file:
      - ../.env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    depends_on:
      movies_elastic:
        condition: service_healthy
      movies_redis:
        condition: service_healthy
      

  movies_database:
    image: postgres:17
    container_name: movies_database
    env_file:
      - ../.env
    volumes:
      - movies_database:/var/lib/postgresql/data
      - ../admin_panel/config/db_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  movies_elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: movies_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - action.auto_create_index=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -f http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  elastic_init:
    image: curlimages/curl:8.17.0
    container_name: elastic_init
    volumes:
      - ./elastic_init.sh:/entrypoint.sh
      - ./es-movies-index.json:/movies-index.json
      - ./es-genres-index.json:/genres-index.json
      - ./es-persons-index.json:/persons-index.json
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      movies_elastic:
        condition: service_healthy

  movies_redis:
    container_name: movies_redis
    image: redis:8
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  movies_database:
  static_volume:
  media_volume:
  esdata:
  etl_logs:
