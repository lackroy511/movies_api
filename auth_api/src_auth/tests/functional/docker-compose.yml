services:
  auth_api:
    container_name: auth_api_tests
    build:
      context: ../../../.
      dockerfile: Dockerfile.tests
    image: auth_api_tests
    command: >
      sh -c "gunicorn -k uvicorn.workers.UvicornWorker -w 1 -b 0.0.0.0:8010 src_api.main:app --no-control-socket"
    env_file:
      - ../../../.env
      - ../../../../.env
    depends_on:
      auth_redis:
        condition: service_healthy
      auth_database:
        condition: service_healthy

  auth_api_run_tests:
    image: auth_api_tests
    container_name: auth_api_run_tests
    command: >
      sh -c "pytest"
    env_file:
      - ../../../.env
      - ../../../../.env
    depends_on:
      - auth_api

  auth_redis:
    container_name: auth_redis_tests
    image: redis:8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth_database:
    image: postgres:17
    container_name: auth_database_test
    env_file:
      - ../../../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5